name: Refresh macro seed

# Advances the committed history snapshot (data/seed_macro.db) so the Streamlit
# Cloud app — which can't run the local Task Scheduler — boots with fresh data.
#
# Each run: restore the seed into cache/, run the full refresh on top of it
# (downloads ~2y of prices + FRED + COT, recomputes signals), copy the updated
# cache back over the seed, and commit it if anything changed.

on:
  schedule:
    # 22:30 UTC on weekdays — safely after the US cash close year-round
    # (16:00 ET = 20:00/21:00 UTC), with a buffer for data to settle.
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Avoid overlapping runs racing on the same commit.
concurrency:
  group: refresh-seed
  cancel-in-progress: false

permissions:
  contents: write   # needed to push the updated seed

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run macro refresh
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Optional: uncomment if you add these repo secrets later.
          # POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          # FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python run_macro.py --full

      - name: Update seed snapshot
        run: cp cache/macro.db data/seed_macro.db

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seed_macro.db
          if git diff --cached --quiet; then
            echo "Seed unchanged — nothing to commit."
          else
            git commit -m "chore: refresh macro seed ($(date -u +%Y-%m-%d))"
            git push
          fi
